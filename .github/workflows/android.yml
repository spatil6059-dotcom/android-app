name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      # Note: We don't have gradlew yet, I should add it or use gradle directly
      continue-on-error: true

    - name: Build with Gradle
      run: gradle build

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Push to Builds Branch
      if: github.event_name == 'push'
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git checkout -b builds || git checkout builds
        mkdir -p binary-builds
        cp app/build/outputs/apk/debug/app-debug.apk binary-builds/
        git add binary-builds/app-debug.apk
        git commit -m "Automated build: $(date)"
        git push origin builds --force
